name: matchmycv
description: A premium AI resume & cover letter builder app
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
   sdk: flutter
  flutter_localizations:
    sdk: flutter

  http: ^1.1.0
  # UI
  cupertino_icons: ^1.0.6
  shimmer: ^3.0.0

  # File & Image Handling
  image_picker: ^1.0.7
  image_cropper: ^6.0.0
  file_picker: ^8.0.0

  # PDF
  pdf: ^3.10.7

  path_provider: ^2.1.2
  share_plus: ^7.2.1
  url_launcher: ^6.2.6
  confetti: ^0.7.0
  # PDF text extraction
  syncfusion_flutter_pdf: ^24.2.9
  # PDF preview (Option A) - Android/iOS native viewer
  flutter_pdfview: ^1.3.4
  percent_indicator: ^4.2.3
  shared_preferences: ^2.2.3
  in_app_purchase: ^3.2.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    # ✅ Templates (thumbnails)
    - assets/templates/

    # ✅ Fonts (IMPORTANT for PDF styling)
    - assets/fonts/Roboto-Regular.ttf
    - assets/fonts/Roboto-Bold.ttf